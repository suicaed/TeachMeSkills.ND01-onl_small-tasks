<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework 3 - Margin & Padding</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main-block block--common">
    <div class="inner-block block--common first">
      <div class="childblock first block--common"></div>
      <div class="childblock second block--common"></div>
      <div class="childblock third block--common">
        <div class="inner-childblock first block--common"></div>
        <div class="inner-childblock second block--common"></div>
      </div>
    </div>
    <div class="inner-block block--common second">
      <div class="childblock block--common"></div>
      <div class="childblock block--common"></div>
      <div class="childblock block--common"></div>
      <div class="childblock block--common"></div>
    </div>
    <div class="inner-block block--common third">
      <div class="childblock first block--common"></div>
      <div class="childblock second block--common">
        <div class="inner-childblock first block--common"></div>
        <div class="inner-childblock second block--common"></div>
      </div>
    </div>
    <div class="inner-block block--common fourth">
      <div class="childblock first block--common">
        <div class="inner-childblock block--common"></div>
        <div class="inner-childblock block--common"></div>
      </div>
      <div class="childblock second block--common"></div>
      <div class="childblock third block--common"></div>
    </div>
  </div>
</body>

</html>
